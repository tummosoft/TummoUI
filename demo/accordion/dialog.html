

<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
    <link href="../../css/core.css" rel="stylesheet" type="text/css" />
    <link href="../../css/dialog.css" rel="stylesheet" type="text/css" />    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
</head>
<style>
    
</style>
<body style="background-color:grey;">
    <div style="margin: 100px;">
        <div id="info">Observe the platform icon's motion direction when there is up and down hover on options.</div>
       
        <div class="tummo-dialog">
           <div class="tummo-dialog-title">
                <img class="dialog-title-icon" src="https://img.icons8.com/office/512/appointment-reminders--v1.png">
                <div class="dialog-title-text">Infomation</div>
                <div class="dialog-title-close"></div>
           </div>
        </div>
    </div>
    
    <script>
        const wd = $('#item-id124').width() + 25;
        $('#box-id124').css("width",wd);
        
        function cboItemClick(id) {
            const vituarlID = id.id;
            const spID = vituarlID.split("-");            
            const newID = '#text-' + spID[1];            
            const boxID = '#box-' + spID[1];
            $(boxID).removeClass('hover-border');

            $(newID).val($(id).text());
            
            const popupID = '#item-' + spID[1]; 
            cboHide(popupID);
            
        }

        function cboButtonClick(ele) {            
            var realID = '#item-' + ele.id;
            const boxID = '#box-' + ele.id;
            $(boxID).addClass('hover-border');
            cboHide(realID);
                      
        }

        function cboHide(realID) {
            if ($(realID).is(":visible")) {
                $(realID).hide().fadeOut(200);
            } else {
                $(realID).show().fadeIn(200);
            }  
        }
    </script>
</body>
</html>
