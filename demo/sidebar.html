    <script>   
       $(document).ready(function (e) {
            var hightsideber = $('.sidebar-content').height();
            var heightscreen = $(window).height();;
            if (hightsideber > heightscreen) {
                $('.sidebar-content').addClass('scrollbar');            
            }        
       });

       var startResize = false;
       var currentx = 0;
       var lastx = 0;
       var lastwidth = 0;
       var canResize = false;

       $('.sidebar-resize').mousedown(function (e) {      
            startResize = true;
            lastx = $('.sidebar-resize').offset().left;
            lastwidth = $('.sidebar-resize').width();
           
       });

        $(window).mouseup(function(e) {
            if (startResize == true) {
                startResize = false;
            }
        });

       $(window).mousemove(function(e) {            
            if (startResize == true) {                
                currentx = e.clientX;                
                if (currentx > lastx) {                    
                    var nWidth = lastwidth + (currentx - lastwidth);                    
                    $('.tummo-sidebar').css('width',nWidth);
                    lastwidth = nWidth;
                } else {
                    var nWidth = lastwidth - (currentx - lastwidth);                    
                    $('.tummo-sidebar').css('width',nWidth);
                    lastwidth = nWidth;
                }
            }
       });
    </script>
