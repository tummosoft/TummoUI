<body style="background-color:white;">
    <div style="margin: 100px;">
       <div class="tummo-toolbar">
            <div class="toolbar-left">
                <div class="dot-circle"></div>
                <div class="dot-circle"></div>
                <div class="dot-circle"></div>
                <div class="dot-circle"></div>                
            </div>
            <div class="toolbar-button">
                <div class="btn-toolbar">
                    <span class="hover-effect"></span>
                    <i class='bx bx-align-left'></i>
                </div>
                <div class="btn-toolbar">
                    <span class="hover-effect"></span>
                    <i class='bx bx-align-middle' ></i></div>
                <div class="btn-toolbar">
                    <span class="hover-effect"></span>
                    <i class='bx bx-align-right' ></i></div>
                <div class="toolbar-line"></div>
                <div class="btn-toolbar">
                    <span class="hover-effect"></span>
                    <i class='bx bx-folder-open' ></i></div>
                    <div class="btn-toolbar">
                        <span class="hover-effect"></span>
                        <svg width="16" height="16" viewBox="0 0 22 22" fill="none"><path clip-rule="evenodd" d="M14 21H5c-2.21 0-4-1.773-4-3.959V8.705A4.944 4.944 0 0 1 3.803 4.26l6.318-3.06a2.019 2.019 0 0 1 1.758 0l6.318 3.059A4.944 4.944 0 0 1 21 8.705v8.336C21 19.227 19.21 21 17 21h-3z" stroke="#333" stroke-width="1.3"/><rect x="15" y="13" width="2" height="4" rx="1" fill="#333"/></svg>
                    </div>
                </div>
       </div>
       
    <script>    
        let toolbarworking = false; 

       function toolbar_hoverEffect(e) {
        
            //var ss = checkButton(e);
            var size = 0;
            var ssize = 70;
            var ele = $(e).find(".hover-effect");
                var id;
                
                ele.show();
                var width = $(e).width();
                id = setInterval(frame, 5);
                function frame() {
                    size = size + 0.6;
                    ele.css("width", size + "px");
                    ele.css("height", size + "px");
                    if (size > ssize) {
                        clearInterval(id);                    
                        ele.hide();                                           
                    }
                }
                toolbarworking = true;     
        }
        
    function toolbar_removeEffect(e) {
        var ele = [];
        var success = false;
        var chk = checkButton(e);

        ele = $('.btn-toolbar');
        
         for (var i=0; i < ele.length; i++) {          
            success = true;            
        }
        if (success == true) {
            working = false;
        }
    }

    $('.btn-toolbar').mouseenter(function (e) {
        toolbar_hoverEffect(this);
    });
    $('.btn-toolbar').mouseleave(function(e) {
        toolbar_removeEffect(e);
    });
    </script>
</body>
