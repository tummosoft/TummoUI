<body style="background-color:grey;">

        <div id="panel1" class="tummo-panel reszie-y">            
            <div class="panel-top">
                <div class="group-left">

                    </div>
                    <div class="tummo-btn tummo-btn-light btn-medium" onmouseleave="quickMenuHideEffect(this)"  onmouseover="btnHoverEffect(this)">

                    </div>
                    <div class="tummo-btn tummo-btn-light btn-medium" onmouseleave="quickMenuHideEffect(this)"  onmouseover="btnHoverEffect(this)">

                        <i class='bx bx-recycle' ></i>
                    </div>
                </div>
                <div class="group-right">
                    <div class="tummo-btn tummo-btn-light btn-medium" onmouseleave="quickMenuHideEffect(this)"  onmouseover="btnHoverEffect(this)">

            <div class="panel-content">
ssssss
            </div>
            <div class="panel-bottom">

                </ul>
            </div>
        </div>
    </div>
    
    <script>     
        dragResizeWidth('#my-element');

       function dragResizeWidth(element) {
            let isDragging = false;
            let currentX;
            let currentWidth;

            $(element).on('mousedown', function(e) {
                isDragging = true;
                currentX = e.pageX;
                currentWidth = $(this).width();
            });

            $(document).on('mouseup', function() {
                isDragging = false;
            });

            $(element).on('mousemove', function(e) {
                if (!isDragging) return;
                let delta = e.pageX - currentX;
                $(this).width(currentWidth + delta);
            });
    }
    </script>
